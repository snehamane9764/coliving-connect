services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: coliving_connect
      POSTGRES_USER: coliving
      POSTGRES_PASSWORD: coliving_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coliving -d coliving_connect"]
      interval: 5s
      timeout: 5s
      retries: 10

  recommender:
    build: ./recommender
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://coliving:coliving_dev@database:5432/coliving_connect
      RECOMMENDER_URL: http://recommender:8000
      CLIENT_URL: http://localhost:5173
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      database:
        condition: service_healthy
      recommender:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3001/api
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
